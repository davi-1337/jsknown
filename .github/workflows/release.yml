name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: jsknown-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: jsknown-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: jsknown-windows-x86_64.exe
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: jsknown-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: jsknown-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}
      - run: cargo build --release --package jsknown-cli --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/jsknown"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then BIN="$BIN.exe"; fi
          cp "$BIN" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-burp-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current
      - run: gradle build
        working-directory: burp-plugin
      - uses: actions/upload-artifact@v4
        with:
          name: jsknown-burp.jar
          path: burp-plugin/build/libs/jsknown-burp.jar

  publish:
    needs:
      - build-binaries
      - build-burp-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
